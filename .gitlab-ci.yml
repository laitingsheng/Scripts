.ubuntu:template: &ubuntu:template
  image: ubuntu:bionic
  script:
    - bash ubuntu.$config.sh -d bionic -l us -u $(whoami)
    - bash ubuntu.$config.test.sh

ubuntu:base:
  variables:
    config: base
  <<: *ubuntu:template
