.ubuntu:template: &ubuntu_template
  image: ubuntu:bionic
  script:
    - bash ubuntu/$config.sh -d bionic -l us -u $(whoami)
    - bash ubuntu/test/$config.sh
  only:
    - master

ubuntu:base:
  variables:
    config: base
  <<: *ubuntu_template

ubuntu:desktop:
  variables:
    config: desktop
  <<: *ubuntu_template
