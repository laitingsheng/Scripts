jobs:
  - job: ubuntu_base
    pool:
      vmImage: "ubuntu-16.04"
    steps:
      - bash: sudo bash ubuntu.base.sh -d xenial -l us -u $(whoami)
      - bash: sudo bash ubuntu.base.test.sh
  - job: ubuntu_desktop
    pool:
      vmImage: "ubuntu-16.04"
    steps:
      - bash: sudo bash ubuntu.desktop.sh -d xenial -l us -u $(whoami)
      - bash: sudo bash ubuntu.desktop.test.sh
