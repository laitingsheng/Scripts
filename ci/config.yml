jobs:
  - job: ubuntu
    pool:
      vmImage: "ubuntu-16.04"
    strategy:
      matrix:
        base:
          config: base
        desktop:
          config: desktop
      maxParallel: 2
    steps:
      - bash: |
          set -ex
          sudo docker run -v $PWD:/repo ubuntu:bionic /bin/bash -c "set -ex; cd /repo; bash ubuntu.$(config).sh -d bionic -l us -u $((whoami)); bash ubuntu.$(config).test.sh  -d bionic -l us -u $((whoami))"
