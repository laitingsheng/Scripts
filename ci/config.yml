jobs:
  - job: ubuntu_base
    pool:
      vmImage: "ubuntu-16.04"
    container: ubuntu:bionic
    steps:
      - bash: bash ubuntu.base.sh -d bionic -l us -u $(whoami)
      - bash: bash ubuntu.base.test.sh
  - job: ubuntu_desktop
    pool:
      vmImage: "ubuntu-16.04"
    container: ubuntu:bionic
    steps:
      - bash: bash ubuntu.desktop.sh -d bionic -l us -u $(whoami)
      - bash: bash ubuntu.desktop.test.sh
