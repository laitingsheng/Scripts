version: 2.1

commands:
  .ubuntu:template:
    parameters:
      config:
        type: string
    steps:
      - run: bash ubuntu/<< parameters.config >>.sh -d bionic -l au

jobs:
  ubuntu:base:
    docker:
      - image: ubuntu:bionic
    steps:
      - .ubuntu:template:
          config: base
  ubuntu:desktop:
    docker:
      - image: ubuntu:bionic
    steps:
      - .ubuntu:template:
          config: extra
workflows:
  version: 2
  multiple-tests:
    jobs:
      - ubuntu:base:
          filters:
            branches:
              only: master
      - ubuntu:desktop:
          filters:
            branches:
              only: master
